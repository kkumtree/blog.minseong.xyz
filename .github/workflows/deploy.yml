name: Deploy Website
on:
  push:
    branches: [ main ]

permissions:
  contents: write

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    
    # Check out latest commit 
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v5
        name: Checkout src repo
        with:
          ref: main

      - uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: 'themes/v-framework/package-lock.json'

      - name: Install Hugo
        run: |
          curl -sSfL "https://github.com/gohugoio/hugo/releases/download/v0.163.3/hugo_extended_0.163.3_linux-amd64.tar.gz" | tar xz
          sudo mv hugo /usr/local/bin/hugo

      - name: Install theme dependencies
        working-directory: 'themes/v-framework'
        run: npm ci --no-audit --no-fund

      - name: Install Dart Sass
        run: |
          curl -sSfL "https://github.com/sass/dart-sass/releases/download/1.101.0/dart-sass-1.101.0-linux-x64.tar.gz" | tar xz
          echo "$PWD/dart-sass" >> "$GITHUB_PATH"

      - name: Build website with hugo
        run: hugo

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd public
          git init
          git config user.name github-actions
          git config user.email github-actions@github.com
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git add .
          git commit -m "Deploy website updates with GitHub Actions: ${GITHUB_SHA}"
          git push --force origin HEAD:gh-pages
